<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" fill="none">
  <rect width="1200" height="900" fill="#0b1020" />
  <rect x="60" y="60" width="1080" height="780" rx="36" fill="#111827" stroke="#1f2a44" stroke-width="2" />
  <text x="90" y="120" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">
    Reference House Layout
  </text>
  <text x="90" y="160" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18">
    Covers outer walls, an interior partition, window placement, drop zones, and sofa dragging.
  </text>

  <g transform="translate(130 190)">
    <rect x="0" y="0" width="780" height="470" fill="#0f172a" stroke="#475569" stroke-width="18" />
    <line x1="390" y1="0" x2="390" y2="260" stroke="#8b5cf6" stroke-width="16" stroke-linecap="round" />

    <rect x="80" y="95" width="150" height="70" rx="18" fill="#6366f1" opacity="0.9" />
    <text x="155" y="137" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">
      SOFA
    </text>

    <rect x="525" y="-10" width="120" height="20" rx="10" fill="#38bdf8" />
    <text x="585" y="-28" text-anchor="middle" fill="#bae6fd" font-family="Arial, sans-serif" font-size="15" font-weight="700">
      WINDOW
    </text>

    <circle cx="390" cy="260" r="12" fill="#f59e0b" />
    <text x="420" y="267" fill="#fbbf24" font-family="Arial, sans-serif" font-size="16" font-weight="700">
      partition end
    </text>

    <path d="M710 360h55" stroke="#22c55e" stroke-width="4" stroke-dasharray="8 8" />
    <path d="M765 360l-18-12v24l18-12Z" fill="#22c55e" />
    <text x="595" y="352" fill="#86efac" font-family="Arial, sans-serif" font-size="16" font-weight="700">
      drag sofa deeper into living area
    </text>

    <text x="20" y="505" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">
      Wall 1
    </text>
    <text x="720" y="235" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">
      Wall 2
    </text>
    <text x="355" y="445" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">
      Wall 3
    </text>
    <text x="-55" y="235" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">
      Wall 4
    </text>
    <text x="405" y="120" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">
      Wall 5
    </text>
  </g>

  <g transform="translate(940 220)">
    <rect width="170" height="250" rx="24" fill="#0f172a" stroke="#334155" />
    <text x="20" y="40" fill="#f8fafc" font-family="Arial, sans-serif" font-size="20" font-weight="700">
      Test Notes
    </text>
    <text x="20" y="80" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16">
      1. Toggle wall mode
    </text>
    <text x="20" y="115" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16">
      2. Draw 5 wall segments
    </text>
    <text x="20" y="150" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16">
      3. Drop sofa + window
    </text>
    <text x="20" y="185" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16">
      4. Re-drag sofa in 2D
    </text>
    <text x="20" y="220" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16">
      5. Switch 2D/3D and save
    </text>
  </g>
</svg>
